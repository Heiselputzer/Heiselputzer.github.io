<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        label{
            margin-right: 5vw;
        }

        a{
            text-decoration: none;
        }

    </style>
</head>
<body>
    <h1>Testformular</h1>

    <form id="personalData">
        <p>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname" required>
        </p>
        <p>
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" required>
        </p>
        <p>
            <label for="email">E-Mail:</label>
            <input type="email" id="email" name="email" required>
        </p>
        <p>
            <label for="telephone">Phone Number:</label>
            <input type="tel" id="telephone" name="tel">
        </p>
        <p>
            <label for="favcolour">Favourite Colour:</label>
            <input type="color" id="favcolour" name="color">
        </p>
        <p>
            <input type="submit" id="submitbutton">
        </p>


    </form>

    <div><a href="/Saved.html">Saved Data</a></div>

    <script>
        function onSubmitClick(event){
            // verhindert das Standard verhalten beim auslösen eines events
            // in dem Fall: das Neuladen der Seite
            event.preventDefault();

            // Formulardaten auslesen, mittels FormData
            const formElement = document.getElementById("personalData");
            const formularData = new FormData(formElement);

            const yourData = {}

            for(const entry of formularData.entries()){

            //dem objekt person wird ein wert zugewiesen.dabei
            // ist der name jedes wertes der gleiche wie der name
            // eines eintrags im formular. der form name befindet sich
            //  in entry[0] un wird mit person key zugeordnet.
            //  also mit dem key kann ein wert zugeordnet werden in
            //  dem fall entry[0]. der wert befindet sich in entry[1]
                yourData[entry[0]] = entry[1];

                console.log("Name des Feldes:", entry[0]);
                console.log("Wert des Feldes:", entry[1]);

            }
            let allEntries = JSON.parse(localStorage.getItem("formularListe")) || [];
            
            allEntries.push(yourData);
            
            localStorage.setItem("formularListe", JSON.stringify(allEntries));

        }

        // variable die auf den submit button referenziert
        const submitbutton = document.querySelector("#submitbutton");

        submitbutton.addEventListener("click", onSubmitClick);
    </script>
</body>
</html>
