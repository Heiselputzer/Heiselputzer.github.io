<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        body { 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            color: #000; 
        }

        .Ausgabe {
            background: #ff5858;
            color: #000;
            padding: 15px;
            margin-bottom: 10vw;
            border-radius: 5px;
            align-items: center;
        }

        .header { 
            margin-bottom: 20px; 
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Deine Daten</h1>
    </div>

    <div id="anzeigeBereich">
        <p>Lade Daten...</p>
    </div>

    <hr>
    <button onclick="löscheAlles()">Alle Daten löschen</button>

    <div><a href="/index.html">Formular</a></div>

    <script>
        function datenAnzeigen() {
            const container = document.getElementById("anzeigeBereich");
            
            const gespeicherteDaten = localStorage.getItem("meineListe");

            if (!gespeicherteDaten) {
                container.innerHTML = "<p>Keine Daten vorhanden</p>";
                return;
            }

            
            const datenArray = JSON.parse(gespeicherteDaten);
            container.innerHTML = ""; 

            datenArray.forEach((user, index) => {
                const ausgabeFeld = document.createElement("div");
                ausgabeFeld.className = "Ausgabe";
                
                ausgabeFeld.innerHTML = `
                    <h3>Eintrag #${index + 1}</h3>
                    <p><strong>Name:</strong> ${user.fname} ${user.lname}</p>
                    <p><strong>E-Mail:</strong> ${user.email}</p>
                    <p><strong>Telefon:</strong> ${user.tel || 'Keine Angabe'}</p>
                    <p><strong>Lieblingsfarbe:</strong> ${user.color} </p>
                `;
                
                container.appendChild(ausgabeFeld);
            });

        }

        function löscheAlles() {
            if(confirm("Wirklich alle Daten löschen?")) {
                localStorage.removeItem("meineListe");
                location.reload();
            }
        }

        window.onload = datenAnzeigen;
        
    </script>
</body>
</html>
