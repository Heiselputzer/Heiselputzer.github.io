<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        body { font-family: 'Segoe UI', sans-serif; padding: 20px; line-height: 1.6; }
        .eintrag-karte {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .farb-kreis {
            display: inline-block;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 1px solid #000;
            vertical-align: middle;
        }
        .header { border-bottom: 2px solid #333; margin-bottom: 20px; }

    </style>
</head>
<body>
    <div>Gespeicherte Daten</div>

    <div class="header">
        <h1>Gespeicherte Formular-Daten</h1>
    </div>

    <div id="anzeigeBereich">
        <p>Lade Daten...</p>
    </div>

    <hr>
    <p><a href="index.html">← Neues Formular ausfüllen</a></p>
    <button onclick="loescheAlles()">Alle Daten löschen</button>

    <div><a href="/index.html">Formular</a></div>

    <script>
        function datenAnzeigen() {
            const container = document.getElementById("anzeigeBereich");
            
            const gespeicherteDaten = localStorage.getItem("meineListe");

            if (!gespeicherteDaten) {
                container.innerHTML = "<p>Keine Daten vorhanden.</p>";
                return;
            }

            
            const datenArray = JSON.parse(gespeicherteDaten);
            container.innerHTML = ""; 

            datenArray.forEach((user, index) => {
                const karte = document.createElement("div");
                karte.className = "eintrag-karte";
                
                karte.innerHTML = `
                    <h3>Eintrag #${index + 1}</h3>
                    <p><strong>Name:</strong> ${user.fname} ${user.lname}</p>
                    <p><strong>E-Mail:</strong> ${user.email}</p>
                    <p><strong>Telefon:</strong> ${user.tel || 'Keine Angabe'}</p>
                    <p><strong>Lieblingsfarbe:</strong> ${user.color} 
                       <span class="farb-kreis" style="background-color: ${user.color}"></span>
                    </p>
                `;
                
                container.appendChild(karte);
            });
        }

        function loescheAlles() {
            if(confirm("Wirklich alle Daten löschen?")) {
                localStorage.removeItem("meineListe");
                location.reload();
            }
        }

        window.onload = datenAnzeigen;
        
    </script>
</body>
</html>
